<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: deep dark blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#090e1c"/>
    </linearGradient>

    <!-- Arc gradients (left→right: blue→violet) -->
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Glow behind each arc -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!--
    Three nested arcs — widest at bottom, narrowest at top.
    Each arc is a quadratic bezier. The control point sits above
    the midpoint of the endpoints, creating a gentle upward curve.

    Arc midpoints (at t=0.5, using Q formula):
      bottom : y ≈ 335
      middle : y ≈ 268
      top    : y ≈ 202
    Gap between arcs ≈ 25 px (stroke-width 44 → radius 22).
  -->

  <!-- Bottom arc (widest, deepest colour) -->
  <path
    d="M 68 415 Q 256 265 444 415"
    stroke="url(#bot)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Middle arc -->
  <path
    d="M 118 338 Q 256 202 394 338"
    stroke="url(#mid)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Top arc (narrowest, lightest colour) -->
  <path
    d="M 168 262 Q 256 142 344 262"
    stroke="url(#top)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"
  />
</svg>
