<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Transparent background variant — for use on dark surfaces
    (README, dark-mode websites, etc.)
  -->
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background (no rect) -->

  <path d="M 68 415 Q 256 265 444 415"
    stroke="url(#bot)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"/>
  <path d="M 118 338 Q 256 202 394 338"
    stroke="url(#mid)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"/>
  <path d="M 168 262 Q 256 142 344 262"
    stroke="url(#top)" stroke-width="44" fill="none" stroke-linecap="round"
    filter="url(#glow)"/>
</svg>
