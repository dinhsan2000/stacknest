name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.23"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go mod download
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v -count=1

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
        env:
          npm_config_loglevel: verbose

      # Linux needs webkit2gtk for Wails build
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          # Install core build tools
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev
          # Install webkit2gtk - try 4.0 first, then 4.1
          sudo apt-get install -y libwebkit2gtk-4.0-dev || \
          sudo apt-get install -y libwebkit2gtk-4.1-dev || \
          echo "Neither webkit2gtk-4.0-dev nor 4.1-dev found"

      - name: Diagnose webkit2gtk (Linux only)
        if: matrix.goos == 'linux'
        run: |
          echo "=== Installed webkit packages ==="
          dpkg -l | grep webkit || echo "No webkit packages installed"
          echo ""
          echo "=== Available webkit2gtk packages in apt ==="
          apt-cache search webkit2gtk | head -20 || echo "No webkit packages found"
          echo ""
          echo "=== Looking for .pc files ==="
          find /usr -name "webkit2gtk*.pc" 2>/dev/null | sort || echo "No .pc files found"
          echo ""
          echo "=== Searching all pkgconfig directories ==="
          ls -la /usr/lib/x86_64-linux-gnu/pkgconfig/ 2>/dev/null | grep webkit || echo "None in /usr/lib/x86_64-linux-gnu/pkgconfig"
          ls -la /usr/lib/pkgconfig/ 2>/dev/null | grep webkit || echo "None in /usr/lib/pkgconfig"
          ls -la /usr/share/pkgconfig/ 2>/dev/null | grep webkit || echo "None in /usr/share/pkgconfig"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:/usr/local/lib/pkgconfig
        run: wails build -clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stacknest-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/
          retention-days: 7
