name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.23"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go mod download
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v -count=1

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
        env:
          npm_config_loglevel: verbose

      # Linux needs webkit2gtk for Wails build
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          # Install core build tools
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev
          # Install webkit2gtk - try 4.0 first, then 4.1
          if ! sudo apt-get install -y libwebkit2gtk-4.0-dev; then
            echo "webkit2gtk-4.0-dev not available, trying 4.1..."
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          fi

      - name: Setup webkit2gtk pkg-config (Linux only)
        if: matrix.goos == 'linux'
        run: |
          # Find where webkit2gtk .pc files are
          WEBKIT_PC=$(find /usr -name "webkit2gtk*.pc" 2>/dev/null | head -1)
          if [ -z "$WEBKIT_PC" ]; then
            echo "ERROR: No webkit2gtk .pc file found!"
            exit 1
          fi

          WEBKIT_DIR=$(dirname "$WEBKIT_PC")
          echo "Found webkit2gtk .pc file in: $WEBKIT_DIR"

          # If it's 4.1, create a symlink for 4.0
          if [ -f "$WEBKIT_DIR/webkit2gtk-4.1.pc" ] && [ ! -f "$WEBKIT_DIR/webkit2gtk-4.0.pc" ]; then
            echo "Creating symlink: webkit2gtk-4.0.pc -> webkit2gtk-4.1.pc"
            sudo ln -sf "$WEBKIT_DIR/webkit2gtk-4.1.pc" "$WEBKIT_DIR/webkit2gtk-4.0.pc"
          fi

          # Export the directory containing the .pc files
          echo "PKG_CONFIG_PATH=$WEBKIT_DIR:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: wails build -clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stacknest-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/
          retention-days: 7
